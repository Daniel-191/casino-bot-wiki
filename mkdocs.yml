site_name: Paradise Bot Wiki
site_description: Complete guide for Paradise Bot - Discord's premier gambling bot
site_author: mal023
site_url: https://daniel-191.github.io/casino-bot-wiki/

theme:
  name: material
  logo: assets/paradise.png
  favicon: assets/paradise.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Dark mode (default)
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/toc-scroll.js
  - javascripts/logo-loader.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

